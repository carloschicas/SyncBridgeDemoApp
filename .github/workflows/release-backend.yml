name: Release — syncbridge-demo-backend

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # create GitHub Releases
  packages: write   # push to GHCR

defaults:
  run:
    working-directory: syncbridge-demo-backend

jobs:
  release:
    name: Build, Test & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: syncbridge-demo-backend/node_modules
          key: ${{ runner.os }}-node22-${{ hashFiles('syncbridge-demo-backend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node22-

      - name: Install dependencies
        run: npm install

      - name: Type-check & compile
        run: npm run build

      - name: Run tests
        run: npm test

      # ── Versioning ────────────────────────────────────────────────────────────
      - name: Extract semantic version
        id: semver
        # Strips the leading 'v' from the tag (v1.2.3 → 1.2.3)
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.semver.outputs.value }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package.json=$PKG_VERSION  tag=$TAG_VERSION"
            exit 1
          fi
          echo "✅ Version match: $PKG_VERSION"

      # ── Changelog ─────────────────────────────────────────────────────────────
      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.semver.outputs.value }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="No changelog entry found for v$VERSION."
          fi
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Generate commit log since previous tag
        id: commits
        # fetch-depth: 0 ensures full history is available for git describe
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            # First release — list all commits
            RANGE="HEAD"
          fi

          # Format each commit as a markdown link:  [`abc1234`](url) subject
          LOG=$(git log "$RANGE" --no-merges \
            --format="- [\`%h\`](${REPO_URL}/commit/%H) %s")

          {
            echo 'log<<EOF'
            echo "$LOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.semver.outputs.value }}"
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ### Commits in this release
            ${{ steps.commits.outputs.log }}
          draft: false
          prerelease: false

      # ── Docker ────────────────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/syncbridge-demo-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=syncbridge-demo-backend
            org.opencontainers.image.description=Demo backend for SyncBridge — idempotent order sync API
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./syncbridge-demo-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.semver.outputs.value }}
