name: Android Release

on:
  push:
    tags:
      - 'android/v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        working-directory: syncbridge-demo-android
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: syncbridge-demo-android
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        working-directory: syncbridge-demo-android
        run: ./gradlew assembleDebug

      - name: Rename APK with version
        run: mv syncbridge-demo-android/app/build/outputs/apk/debug/app-debug.apk syncbridge-demo-android/app/build/outputs/apk/debug/syncbridge-demo-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SyncBridge Demo ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: syncbridge-demo-android/app/build/outputs/apk/debug/syncbridge-demo-${{ github.ref_name }}.apk
          body_path: syncbridge-demo-android/CHANGELOG.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
